[global/wm]
include-file = ~/.config/polybar/colors.ini

[bar/bar1]
width = 100%
height = 22pt
radius = 0

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt
line-color=#f00

;border-size = 1pt
;border-color = #aaaaaa

padding-left = 0
padding-right = 1

module-margin = 1

separator = | 
separator-foreground = ${colors.accent}

font-0 = "JetBrainsMono Nerd Font:size=10;2"
font-1 = "Font Awesome 7 Free Solid:size=13;4"
font-2 = "JetBrainsMono Nerd Font:size=10;2
font-3 = "Symbols Nerd Font Mono=13;4"
font-4 = "Material Design Icons:style=Regular:size=18;2"

modules-left = i3 xwindow
modules-right = spotify youtube volume brightness battery date systray powermenu

cursor-click = pointer
cursor-scroll = ns-resize√¨

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
wm-restack = i3

; override-redirect = true

; This module is not active by default (to enable it, add it to one of the
; modules-* list above).
; Please note that only a single tray can exist at any time. If you launch
; multiple bars with this module, only a single one will show it, the others
; will produce a warning. Which bar gets the module is timing dependent and can
; be quite random.
; For more information, see the documentation page for this module:
; https://polybar.readthedocs.io/en/stable/user/modules/tray.html
[module/systray]
type = internal/tray
;format-margin = 2pt

[module/xwindow]
type = internal/xwindow
label = %title:0:50:...%
label-foreground = ${colors.peach}
label-background = ${colors.background-alt}
label-padding-left = 1
label-padding-right = 1

[module/battery]
type = internal/battery
battery = BAT1
adapter = ACAD

full-at = 98
poll-interval = 5

format-dead = <label-dead>
format-dead-prefix = "ůįāé"
format-dead-prefix-foreground = ${colors.red-alt}
format-charging = <label-charging>
format-charging-prefix = "ůįāĄ"
format-charging-prefix-foreground = ${colors.green}
format-discharging = <label-discharging>
format-discharging-prefix = "ůĪüě"
format-discharging-prefix-foreground = ${colors.yellow}
format-full = <label-full>
format-full-prefix = "ůįĀĻ"
format-full-prefix-foreground = ${colors.teal}

label-charging = %percentage%%
label-charging-foreground = ${colors.green}
label-discharging = %percentage%%
label-discharging-foreground = ${colors.yellow}
label-full = %percentage%%
label-full-foreground = ${colors.teal}
label-dead = %percentage%%
label-dead-foreground = ${colors.red-alt}

[module/volume]
type = custom/text

label= ÔÄ®
label-foreground = ${colors.lime}

click-left = kitty -e pulsemixer

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = Ôáę %{F#FFC5D3}%essid%%{F-} %signal%%
label-disconnected =%{F#F38BA8} ůįĖ™%{F-} Offline

[module/brightness]
type = custom/script
exec = ~/.config/polybar/scripts/brightness.sh
interval = 1
scroll-up = ~/.config/polybar/polybar-brightness.sh up
scroll-down = ~/.config/polybar/polybar-brightness.sh down
label = %output%
label-foreground = ${colors.yellow}

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt= %d-%m-%y %H:%M:%S

format-label = <label>
;format-prefix-label = "ÔĀ≥ "
label = %date%
label-foreground = ${colors.indigo}

[module/spotify]
type = custom/script
interval = 2

exec =  ~/.config/polybar/scripts/spotify.sh
label = %output%
format = <label>

click-left = playerctl --player=spotify play-pause
click-right = playerctl --player=spotify next
click-middle = playerctl --player=spotify previous

[module/bluetooth]

type = custom/script
exec = ~/.config/polybar/scripts/bluetooth.sh
interval = 3
format = <label>
format-foreground = ${colors.blue}
label = %output%

click-left = exec bluetoothctl toggle
click-right = exec blueberry

[module/youtube]

type = custom/script
interval = 2

exec = ~/.config/polybar/scripts/youtube.sh
label = %output%
format = <label>
click-left = playerctl play-pause

[module/powermenu]
type = custom/text
content = "ÔÄĎ"
content-foreground = ${colors.red-alt}
click-left = ~/.config/polybar/scripts/powermenu.sh

[module/i3]
type =  internal/i3

label-focused=%icon%
label-focused-background = ${colors.background-alt}
label-focused-underline = ${colors.red-alt}
label-focused-foreground = ${colors.foreground-alt}
label-focused-padding = 1

label-unfocused=%icon%
label-unfocused-padding = 1
label-unfocused-foreground = ${colors.foreground}
label-occupied=%icon%
label-occupied-padding = 1

label-urgent=%icon%!
label-urgent-background= ${colors.red}
label-urgent-padding = 1

label-empty=%icon%
label-empty-foreground=${colors.teal}
label-empty-padding = 1

ws-icon-0 = 1;ůį¨ļ
ws-icon-1 = 2;ůį¨Ľ
ws-icon-2 = 3;ůį¨ľ
ws-icon-3 = 4;ůį¨Ĺ
ws-icon-4 = 5;ůį¨ĺ
ws-icon-5 = 6;ůįėö
ws-icon-6 = 7;ÔĄ†
ws-icon-7 = 8;ůįė¶
ws-icon-8 = 9;ůįąĻ
ws-icon-9 = 10;ůįģ†
ws-icon-default =ůįŹČ

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
